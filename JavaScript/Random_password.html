<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let passwordList = "asdfghjkl789632010!@#$%^&*";
        let password = []
        passwordList_length = passwordList.length
        // console.log(passwordList_length)

        for(let i=1; i<9; i++){
            let randomPassword=Math.floor(Math.random()*passwordList_length)
            // console.log(randomPassword);
            let randomCharacter=passwordList.charAt(randomPassword)
            console.log(randomCharacter);
            password.push(randomCharacter);
        }
        console.log(password);
        let random=password.join("");
        console.log(random);
    </script>
</body>
