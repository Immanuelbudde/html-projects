<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        #doctors{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 20px;
        }
        .card{
            border: 4px solid black;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div id="doctors"></div>
    <script>
        onload=function(){
            getDoctor()
        }
        function getDoctor(){
            fetch("https://doc-back.onrender.com/doctors", {
                method:"GET"
            })
            .then((result)=>{ //response object, json text
                console.log(result)
                return result.json(); //json
            })
            .then((doopika)=>{ //access
                console.log(doopika);
                showDoctors(doopika)
            })
        }
        // getDoctor()
        function showDoctors(doopika){
            doopika.map((i)=>{
                console.log(i.name, i.salary)

            document.getElementById("doctors").innerHTML +=
            `
            <div class=card>
                <p>${i.name}</p>
                <p>${i.salary}</p>
                <p>${i.age}</p>
                <p>${i.gender}</p>
                <p>${i.specialization}</p>
                <button onclick="deleteDoctor(${i.id})">Delete</button>
                <button onclick="updateDoctor('${i.id}','${i.name}','${i.salary}','${i.age}','${i.gender}','${i.specialization}')">Update</button>
            </div>
            
            `
            });
        }
        
        
        function deleteDoctor(id){
            axios.delete(`https://doc-back.onrender.com/doctors/${id}`)
            .then((result)=>{
                console.log(result)
                alert("Sucessfully deleted");
                getDoctor()
            })
        }

        function updateDoctor(id,name,salary,gender,age,specialization){

            let newName=prompt("Enter your name",name);
            let newSalary=prompt("Enter your salary",salary);
            let newGender=prompt("Enter your gender",gender);
            let newAge=prompt("Enter your age",age);
            let newSpecialization=prompt("Enter your specialization",specialization);

            axios.put(`https://doc-back.onrender.com/doctors/${id}`,{
                name:newName,
                salary:newSalary,
                gender:newGender,
                age:newAge,
                specialization:newSpecialization
            })
            .then((result)=>{
                alert("Updated Successfully")

            })
            .catch((error)=>{
                console.log(error)
                alert("Updation failed")
            })

        }
    </script>
</body>
</html>
