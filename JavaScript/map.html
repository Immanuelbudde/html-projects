<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let studentList=[
            {name:"teja",money:5678,class:"cg1"},
            {name:"thanishq",money:5667,class:"cf1"},
            {name:"vimala",money:5078,class:"ch1"},
            {name:"mahitha",money:5778,class:"cd1"}
        ]
        let b= studentList.map((i)=>{
            return i.name;
        })
        console.log(b);

        let c=studentList.map((i)=>{
            return i.money+5000;
        })
        console.log(c);

        let d=studentList.map((i)=>{
            if(i.money>5500){
                return i.money;
            }
        })
        console.log(d);

       let e=studentList.filter((i)=>{
            if(i.money>5500){
                return i.money;
            }
        })
        console.log(e); 

        let f=studentList.find((i)=>{
            if(i.money>5500){
                return i.money;
            }
        })
        console.log(f);  //give the output as who first satisfied the condition
    
        let g=studentList.findIndex((i)=>{
            if(i.money>5500){
                return i.money;
            }
        })
        console.log(g);

        let h=studentList.some((i)=>{  
            if(i.money>5500){
                return i.money;  //prints true if any one satisfied the condition otherwise false
            }
        })
        console.log(h);

        let i=studentList.every((i)=>{  
            if(i.money>5500){
                return i.money;  //prints true if every one satisfied the condition otherwise false
            }
        })
        console.log(i);
    </script>
</body>
</html>
